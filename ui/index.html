<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CommentRanking</title>
    <link rel="stylesheet" href="/ui/style.css" />
  </head>
  <body>
    <div id="app">
      <aside class="sidebar">
        <div class="sidebar__section">
          <div class="title">CommentRanking</div>
          <div class="muted">人类排序标注演示</div>
        </div>

        <div class="sidebar__section" id="actionsSection">
          <label class="label" for="modeSelect" id="modeLabel">模式</label>
          <select id="modeSelect" class="select">
            <option value="both">文本+音频</option>
            <option value="audio">仅音频</option>
            <option value="text">仅文本</option>
          </select>
          <div class="row">
            <button id="reloadBtn" class="btn btn--ghost">重载</button>
            <button id="exportBtn" class="btn btn--ghost">导出</button>
            <a class="btn btn--ghost admin-only" id="statsLink" href="/ui/stats/">统计</a>
            <button id="logoutBtn" class="btn btn--ghost">退出登录</button>
          </div>
        </div>

        <div class="sidebar__section" id="taskInfoSection">
          <div class="label">当前比赛</div>
          <div id="matchMeta" class="meta muted">未加载</div>
          <div class="meta muted">用户：<span id="userIdText">-</span></div>
          <div class="meta muted">进度：<span id="progressText">0</span></div>
        </div>

        <div class="sidebar__section sidebar__section--bottom" id="navSection">
          <div class="row">
            <button id="prevBtn" class="btn btn--ghost">上一条</button>
            <button id="nextBtn" class="btn btn--ghost">下一条</button>
          </div>
        </div>
      </aside>

      <main class="main">
        <section class="videoSection">
          <video id="video" class="video" controls playsinline></video>
        </section>
        <div id="videoResizeHandle" class="videoResizeHandle" role="separator" aria-orientation="horizontal" aria-label="调整视频高度"></div>

        <section class="sortSection">
          <div class="sortCols">
            <div class="col">
              <div class="col__header">未排序</div>
              <div id="unrankedList" class="list"></div>
            </div>

            <div class="col">
              <div class="col__header col__header--withTools">
                <span>已排序（从好到坏）</span>
                <label class="compactToggle">
                  <input id="rankedCompactToggle" type="checkbox" checked />
                  <span>紧凑模式</span>
                </label>
              </div>
              <div id="rankedList" class="list list--ranked"></div>
              <div class="actions">
                <button id="submitBtn" class="btn btn--primary" disabled>提交并下一条</button>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div id="statusText" class="srOnly" aria-live="polite"></div>

    <div id="completionOverlay" class="completionOverlay" hidden>
      <div class="completionBackdrop"></div>
      <div class="completionCard" role="dialog" aria-modal="true">
        <div class="completionTop">
          <div class="completionMark">完成</div>
          <div>
            <div class="completionTitle">任务已全部完成</div>
            <div id="completionSubtitle" class="muted">感谢你的标注贡献</div>
          </div>
        </div>

        <div class="completionStats">
          <div class="completionStat">
            <div class="completionStat__label">已完成</div>
            <div id="completionDone" class="completionStat__value">0</div>
          </div>
          <div class="completionStat">
            <div class="completionStat__label">总任务</div>
            <div id="completionTotal" class="completionStat__value">0</div>
          </div>
          <div class="completionStat">
            <div class="completionStat__label">用时</div>
            <div id="completionElapsed" class="completionStat__value">-</div>
          </div>
        </div>

        <div class="completionActions">
          <button id="completionExportJsonl" class="btn btn--primary">导出 JSONL</button>
          <button id="completionExportCsv" class="btn btn--ghost">导出 CSV</button>
          <a class="btn btn--ghost admin-only" href="/ui/stats/">进入统计页</a>
        </div>

        <div class="completionActions completionActions--secondary">
          <button id="completionRestart" class="btn btn--ghost">重新开始</button>
          <button id="completionContinue" class="btn btn--ghost">继续标注</button>
        </div>
      </div>
    </div>

    <script>
      (function () {
        var st = document.getElementById("statusText");
        if (st) st.textContent = "加载中…（若长时间不变请 Ctrl+F5，并确认 /ui/app.js 返回 text/javascript）";
        window.addEventListener("error", function (e) {
          var msg = (e && (e.message || (e.error && e.error.message))) || "unknown_error";
          if (st) st.textContent = "前端错误: " + msg;
        });
        window.addEventListener("unhandledrejection", function (e) {
          var reason = (e && e.reason) || "";
          var msg = (reason && (reason.message || String(reason))) || "unhandled_rejection";
          if (st) st.textContent = "请求失败: " + msg;
        });
      })();
    </script>
    <script type="module" src="/ui/app.js"></script>
  </body>
</html>
